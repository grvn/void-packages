name: update
run-name: "Automated update of ${{ github.ref_name }} by @${{ github.actor }}"

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  find-autoupdates:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    outputs:
      pkgs: ${{ steps.collect.outputs.pkgs }}
    steps:
      - uses: actions/checkout@v6

      - uses: dcarbone/install-jq-action@v3.2.0

      - name: Find autoupdate scripts
        id: collect
        run: |
          updates=$(find srcpkgs -mindepth 2 -maxdepth 2 -type f -name update.sh)
          if [ -z "$updates" ]; then
            echo "pkgs=[]" >> "$GITHUB_OUTPUT"
          else
            while read path; do
              dir=$(dirname "$path")
              pkg=$(basename "$dir")
              echo "{\"dir\":\"$dir\",\"name\":\"$pkg\",\"path\":\"$path\"}"
            done <<< "${updates}" | jq -cs > pkgs.json

            echo "pkgs=$(cat pkgs.json)" >> "$GITHUB_OUTPUT"
          fi

  update-versions:
    name: update ${{ matrix.pkg.name }}
    runs-on: ubuntu-latest
    needs: find-autoupdates
    if: ${{ needs.find-autoupdates.outputs.pkgs != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.find-autoupdates.outputs.pkgs) }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.PULL_PUSH }}

      # - name: Run updates
      #   run: |
      #     find srcpkgs -mindepth 2 -maxdepth 2 -type f -name update.sh -exec {} \;
      #   env:
      #     GH_TOKEN: ${{ github.token }}
      #   continue-on-error: true

      - name: Run updates
        id: "update"
        run: |
          pkg="${{ matrix.pkg.name }}"
          dir="${{ matrix.pkg.dir }}"
          logfile="$dir/update.log"

          echo "Running update for $pkg" | tee "$logfile"
          if bash "${{ matrix.pkg.path }}" 2>&1 | tee -a "$logfile"; then
            echo "success" > "$dir/status.txt"
          else
            echo "failure" > "$dir/status.txt"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ${{ matrix.pkg.name }}
          path: ${{ matrix.pkg.dir }}/*

  commit-updates:
    runs-on: ubuntu-latest
    needs: update-versions
    if: always()
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.PULL_PUSH }}

      - uses: actions/download-artifact@v7
        with:
          path: ./srcpkgs

      - name: Package update results summary
        run: |
          echo "## Package Update Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Status | Log |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|-----|" >> "$GITHUB_STEP_SUMMARY"

          shopt -s nullglob
          for pkgdir in srcpkgs/*; do
            pkg=$(basename "$pkgdir")
            status="unknown"

            if [ -f "$pkgdir/status.txt" ]; then
              status=$(cat "$pkgdir/status.txt")
            fi

            logfile="logs/log-$pkg/$pkg.log"
            if [ -f "$logfile" ]; then
              loglink="[view](./$logfile)"
            else
              loglink="N/A"
            fi

            case "$status" in
              success)
                echo "| $pkg | 🟢 Success | $loglink |" >> "$GITHUB_STEP_SUMMARY"
                ;;
              failure)
                echo "| $pkg | 🔴 Failed | $loglink |" >> "$GITHUB_STEP_SUMMARY"
                ;;
              *)
                echo "| $pkg | ⚪ N/A | $loglink |" >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
          done

      - name: Remove status files
        run: |
          find srcpkgs -mindepth 2 -maxdepth 2 -type f -name status.txt -exec rm {} \;
          find srcpkgs -mindepth 2 -maxdepth 2 -type f -name update.log -exec rm {} \;

      - name: Updated templates summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Updated Templates" >> "$GITHUB_STEP_SUMMARY"

          changed=$(git diff --name-only | grep 'srcpkgs/.*/template$' || true)

          if [ -z "$changed" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No template changes detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Changed files" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$changed" | while read file; do
              pkg=$(echo "$file" | cut -d'/' -f2)
              echo "- **$pkg** → \`$file\`" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

      - name: Diff preview
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Diff Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          diff_output=$(git diff --patch --minimal | sed 's/^/    /')

          if [ -z "$diff_output" ]; then
            echo "No diff available." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "<details><summary>Click to expand diff</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            echo "$diff_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: commit updates
        id: check-updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --all --message "Automated update"
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new updates"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: push updates
        if: steps.check-updates.outputs.has_updates == 'true'
        uses: ad-m/github-push-action@v1.0.0
        with:
          github_token: ${{ secrets.PULL_PUSH }}
          branch: ${{ github.ref }}
